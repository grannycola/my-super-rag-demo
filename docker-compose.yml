services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles:
      - qdrant

  api:
    build: .
    expose:
      - "8081"
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8081

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  qdrant_data:
